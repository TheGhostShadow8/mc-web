<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bedrock Web</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: #111; }
        /* This container helps bypass some browser blocks */
        .game-container { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div class="game-container">
        <iframe src="https://via.shog.gg/minecraft/" allow="fullscreen; autoplay; gamepad; keyboard"></iframe>
    </div>
</body>
</html>
