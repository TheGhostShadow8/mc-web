<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GHOST SHADOW ENGINE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="coords-hud">XYZ: 0 / 0 / 0</div>

    <div id="server-box">
        <div class="status-bar"><div id="status-dot"></div><span id="status-display-text">INITIALIZING...</span></div>
        <h2 style="color: #00ff41;">GHOST SHADOW</h2>
        
        <div id="auth-step-1">
            <input type="email" id="user-email" placeholder="Email Address">
            <button id="send-otp-btn" class="green-btn">SEND SECURITY CODE</button>
        </div>
        <div id="auth-step-2" style="display:none;">
            <input type="number" id="otp-input" placeholder="6-Digit Code">
            <button id="verify-btn" class="green-btn">VERIFY OTP</button>
        </div>
        <div id="ms-sync" style="display:none;">
            <button id="real-ms-btn" class="blue-btn">LOGIN WITH MICROSOFT</button>
        </div>
        <div id="server-details" style="display:none;">
            <input type="text" id="server-ip" placeholder="Server IP (Aternos)">
            <input type="number" id="server-port" placeholder="Port" value="19132">
            <button id="start-btn" class="green-btn">JOIN SERVER</button>
        </div>
    </div>

    <div id="loader-container" style="display: none;">
        <p>LOADING WORLD...</p>
        <div id="progress-bg"><div id="progress"></div></div>
    </div>

    <div id="crosshair"><div class="ch-v"></div><div class="ch-h"></div></div>

    <canvas id="game-canvas"></canvas>

    <div id="mobile-controls" style="display: none;">
        <div class="top-bar">
            <button id="btn-chat-toggle">💬</button>
            <button id="btn-settings">⚙️</button>
        </div>

        <div class="dpad">
            <button id="btn-forward" class="ctrl-btn">▲</button>
            <div class="dpad-mid">
                <button id="btn-left" class="ctrl-btn">◀</button>
                <button id="btn-sneak" class="ctrl-btn-small">◆</button>
                <button id="btn-right" class="ctrl-btn">▶</button>
            </div>
            <button id="btn-back" class="ctrl-btn">▼</button>
        </div>

        <div class="action-btns">
            <button id="btn-attack" class="action-circle">HIT</button>
            <button id="btn-use" class="action-circle">USE</button>
            <button id="btn-jump" class="jump-btn-bedrock">JUMP</button>
        </div>

        <div class="hotbar">
            <div class="slot active-slot"></div><div class="slot"></div><div class="slot"></div>
            <div class="slot"></div><div class="slot"></div><div class="slot"></div>
            <div class="slot"></div><div class="slot"></div><div class="slot"></div>
        </div>
    </div>

    <script src="https://unpkg.com/prismarine-viewer/dist/viewer.js"></script>
    <script type="module" src="loader.js"></script>
</body>
</html>
