<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghost Shadow Engine | Bedrock Web</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loading-screen">
        <div class="logo">GHOST SHADOW</div>
        
        <div id="server-box">
    <h3 style="color: #00ff41;">GHOST SHADOW | SECURE LOGIN</h3>
    
    <div id="auth-step-1">
        <input type="email" id="user-email" placeholder="Email Address">
        <button id="send-otp-btn">SEND LOGIN OTP</button>
    </div>

    <div id="auth-step-2" style="display:none;">
        <input type="number" id="otp-input" placeholder="6-Digit Code">
        <button id="verify-btn">VERIFY ACCESS</button>
    </div>

    <div id="ms-sync" style="display:none;">
        <p style="font-size: 0.8rem; color: #aaa;">Access Granted. Now Sync Xbox Profile:</p>
        <button id="real-ms-btn" style="background: #0078d4; color: white; padding: 10px; border: none; border-radius: 5px; width: 100%; font-weight: bold;">SYNC MICROSOFT ACCOUNT</button>
    </div>

    <div id="server-details" style="display:none; margin-top:15px; border-top: 1px solid #333; padding-top: 10px;">
        <input type="text" id="world-name" placeholder="World Name">
        <input type="text" id="server-ip" value="Occults8.aternos.me">
        <input type="number" id="server-port" value="48439">
        <button id="start-btn">LAUNCH BEDROCK ENGINE</button>
    </div>
    
    <p id="login-status" style="font-size: 0.7rem; margin-top: 10px;">Status: Encrypted</p>
</div>
